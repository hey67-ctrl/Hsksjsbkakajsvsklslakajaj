<!DOCTYPE html>
<html>
<head>
  <title>Kahoot Bot</title>
  <style>
    body {
      background: linear-gradient(135deg, #000000, #4A148C);
      font-family: Arial, sans-serif;
      color: white;
      padding: 30px;
      margin: 0;
      min-height: 100vh;
    }
    .box {
      background: rgba(0,0,0,0.6);
      padding: 25px;
      border-radius: 12px;
      max-width: 400px;
      margin: 0 auto;
      border: 1px solid #9C27B0;
    }
    h1 {
      text-align: center;
      color: #CE93D8;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }
    input {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid #BA68C8;
    }
    button#start {
      background: #7B1FA2;
      color: white;
      font-weight: bold;
    }
    button#stop {
      background: #424242;
      color: white;
    }
    #status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      display: none;
    }
    .success { background: #2E7D32; }
    .error { background: #C62828; }
  </style>
</head>
<body>

  <div class="box">
    <h1>KAHOOT BOT</h1>

    <label>Game PIN</label>
    <input id="pin" type="text" placeholder="Enter PIN">

    <label>Bot Name</label>
    <input id="name" type="text" placeholder="e.g. Player">

    <label>Number of Bots</label>
    <input id="count" type="number" min="1" max="20" value="5">

    <button id="start">SPAWN BOTS</button>
    <button id="stop" disabled>STOP</button>

    <div id="status"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
