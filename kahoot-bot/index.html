<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kahoot Bot Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { dark: '#000', purple: {900:'#2D0C5E', 500:'#7B1FA2', 400:'#9C27B0'} },
          boxShadow: { glow: '0 0 20px rgba(156,39,176,0.6)' }
        }
      }
    }
  </script>
  <style>
    @keyframes float {
      0%,100% {transform:translateY(0)}
      50% {transform:translateY(-10px)}
    }
    .animate-float {animation:float 4s ease-in-out infinite}
    .fade-in {animation:fadeIn 0.6s ease-out forwards}
    @keyframes fadeIn {
      from {opacity:0;transform:translateY(20px)}
      to {opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body class="bg-gradient-to-b from-dark to-purple-900 min-h-screen text-white flex items-center justify-center p-4">
  <!-- Background -->
  <div class="fixed w-full h-full -z-10 overflow-hidden">
    <div class="absolute w-[600px] h-[600px] rounded-full bg-purple-500/10 blur-3xl -top-40 -left-40 animate-float"></div>
    <div class="absolute w-[500px] h-[500px] rounded-full bg-purple-400/10 blur-3xl bottom-20 right-20 animate-float" style="animation-delay:2s"></div>
  </div>

  <!-- Sounds -->
  <audio id="click" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-2226.mp3" preload="auto">
  <audio id="ok" src="https://assets.mixkit.co/sfx/preview/mixkit-completion-notification-2746.mp3" preload="auto">
  <audio id="err" src="https://assets.mixkit.co/sfx/preview/mixkit-game-over-trombone-1940.mp3" preload="auto">

  <div class="w-full max-w-md fade-in">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-purple-200 drop-shadow-[0_0_10px_rgba(186,104,200,0.5)]">KAHOOT BOT PRO</h1>
      <p class="text-purple-300 mt-2">Spawn bots • Fast • Cool</p>
    </div>

    <div class="bg-black/70 backdrop-blur-md rounded-2xl p-6 shadow-glow border border-purple-500/20">
      <div class="space-y-5">
        <!-- PIN -->
        <div>
          <label class="flex items-center gap-2 text-sm text-purple-200 mb-2">
            <i class="fa fa-key text-purple-400"></i> Kahoot PIN
          </label>
          <input id="gameId" type="text" placeholder="6-7 digits" class="w-full px-4 py-3 rounded-lg bg-purple-900/30 border border-purple-500/30 focus:outline-none focus:shadow-[0_0_0_2px_rgba(156,39,176,0.5)] text-white">
        </div>

        <!-- Name -->
        <div>
          <label class="flex items-center gap-2 text-sm text-purple-200 mb-2">
            <i class="fa fa-user-circle text-purple-400"></i> Bot Name
          </label>
          <input id="botName" type="text" placeholder="e.g. Shadow" class="w-full px-4 py-3 rounded-lg bg-purple-900/30 border border-purple-500/30 focus:outline-none focus:shadow-[0_0_0_2px_rgba(156,39,176,0.5)] text-white">
        </div>

        <!-- Count -->
        <div>
          <label class="flex items-center gap-2 text-sm text-purple-200 mb-2">
            <i class="fa fa-hashtag text-purple-400"></i> Number <span class="text-xs opacity-60">(max 20)</span>
          </label>
          <input id="botCount" type="number" min="1" max="20" value="5" class="w-full px-4 py-3 rounded-lg bg-purple-900/30 border border-purple-500/30 focus:outline-none focus:shadow-[0_0_0_2px_rgba(156,39,176,0.5)] text-white">
        </div>

        <!-- Buttons -->
        <div class="grid grid-cols-2 gap-3">
          <button id="startBtn" class="bg-gradient-to-r from-purple-700 to-purple-500 hover:from-purple-500 hover:to-purple-700 py-3 rounded-lg font-semibold transition-transform hover:scale-[1.02] active:scale-[0.98]">
            <i class="fa fa-rocket mr-2"></i> SPAWN
          </button>
          <button id="stopBtn" class="bg-purple-900/50 hover:bg-purple-800/60 py-3 rounded-lg font-semibold opacity-70 hover:opacity-100 border border-purple-500/20" disabled>
            <i class="fa fa-stop-circle mr-2"></i> STOP
          </button>
        </div>

        <!-- Status -->
        <div id="status" class="mt-4 p-3 rounded-lg text-sm hidden"></div>

        <!-- Progress -->
        <div id="progressBox" class="mt-2 hidden">
          <div class="w-full bg-purple-950/50 rounded-full h-2 overflow-hidden border border-purple-500/20">
            <div id="progressBar" class="bg-gradient-to-r from-purple-600 to-purple-400 h-2 w-0 transition-all"></div>
          </div>
          <p id="progressText" class="text-xs text-center mt-2 text-purple-300/70">0 / 0</p>
        </div>
      </div>
    </div>

    <p class="text-xs text-purple-400/50 text-center mt-6">⚠️ For education only — don't break rules</p>
  </div>

  <script src="script.js"></script>
</body>
  </html>
