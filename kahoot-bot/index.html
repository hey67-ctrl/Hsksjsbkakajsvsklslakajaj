<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kahoot Bot Pro | L EDITION</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#000000',
            purple: {
              900: '#2D0C5E',
              800: '#3B077A',
              700: '#4A148C',
              600: '#6A1B9A',
              500: '#7B1FA2',
              400: '#9C27B0',
              300: '#BA68C8',
            }
          },
          boxShadow: {
            'glow': '0 0 20px rgba(156, 39, 176, 0.6), 0 0 40px rgba(156, 39, 176, 0.3)',
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .text-shadow { text-shadow: 0 0 10px rgba(186, 104, 200, 0.7); }
      .input-glow:focus { box-shadow: 0 0 0 2px rgba(156, 39, 176, 0.5), 0 0 15px rgba(156, 39, 176, 0.3); }
      .float-1 { animation: float1 6s ease-in-out infinite; }
      .float-2 { animation: float2 7s ease-in-out infinite; }
      .float-3 { animation: float3 8s ease-in-out infinite; }
      .float-4 { animation: float4 5s ease-in-out infinite; }
      .float-5 { animation: float5 9s ease-in-out infinite; }
      .pulse-glow { animation: pulseGlow 2s infinite alternate; }
    }

    @keyframes float1 {
      0%,100% { transform: translate(0, 0) rotate(5deg); }
      25% { transform: translate(30px, -40px) rotate(-5deg); }
      50% { transform: translate(-20px, -70px) rotate(8deg); }
      75% { transform: translate(40px, -30px) rotate(-3deg); }
    }
    @keyframes float2 {
      0%,100% { transform: translate(0, 0) rotate(-3deg); }
      25% { transform: translate(-40px, -50px) rotate(6deg); }
      50% { transform: translate(20px, -80px) rotate(-7deg); }
      75% { transform: translate(-30px, -40px) rotate(4deg); }
    }
    @keyframes float3 {
      0%,100% { transform: translate(0, 0) rotate(8deg); }
      25% { transform: translate(20px, -60px) rotate(-6deg); }
      50% { transform: translate(-30px, -90px) rotate(5deg); }
      75% { transform: translate(50px, -50px) rotate(-8deg); }
    }
    @keyframes float4 {
      0%,100% { transform: translate(0, 0) rotate(-5deg); }
      25% { transform: translate(-30px, -30px) rotate(7deg); }
      50% { transform: translate(40px, -60px) rotate(-4deg); }
      75% { transform: translate(-20px, -80px) rotate(6deg); }
    }
    @keyframes float5 {
      0%,100% { transform: translate(0, 0) rotate(4deg); }
      25% { transform: translate(40px, -70px) rotate(-8deg); }
      50% { transform: translate(-50px, -40px) rotate(7deg); }
      75% { transform: translate(30px, -60px) rotate(-5deg); }
    }
    @keyframes pulseGlow {
      from { filter: drop-shadow(0 0 8px currentColor); }
      to { filter: drop-shadow(0 0 20px currentColor); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
  </style>
</head>
<body class="bg-gradient-to-b from-dark to-purple-900 min-h-screen font-sans text-white flex items-center justify-center p-4 overflow-x-hidden overflow-y-hidden relative">

  <!-- 🎉 FLOATING SILLY WORDS 🎉 -->
  <div class="absolute top-1/4 left-1/4 text-4xl font-black text-red-500 text-shadow float-1 pulse-glow z-0">L</div>
  <div class="absolute top-1/3 right-1/3 text-2xl font-bold text-pink-400 text-shadow float-2 pulse-glow z-0">Kahoot Sucks</div>
  <div class="absolute top-2/3 left-1/5 text-3xl font-black text-yellow-400 text-shadow float-3 pulse-glow z-0">No Skill</div>
  <div class="absolute top-1/5 right-1/4 text-xl font-bold text-cyan-300 text-shadow float-4 pulse-glow z-0">Bot Army</div>
  <div class="absolute top-3/4 right-1/5 text-2xl font-black text-green-400 text-shadow float-5 pulse-glow z-0">GG</div>
  <div class="absolute top-2/5 left-1/3 text-lg font-bold text-orange-400 text-shadow float-1 pulse-glow z-0">Too Easy</div>
  <div class="absolute top-1/2 right-1/6 text-3xl font-black text-purple-300 text-shadow float-2 pulse-glow z-0">L + RATIO</div>

  <!-- Background Glow -->
  <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
    <div class="absolute w-[700px] h-[700px] rounded-full bg-purple-500/10 blur-3xl -top-40 -left-40"></div>
    <div class="absolute w-[600px] h-[600px] rounded-full bg-pink-500/10 blur-3xl bottom-20 right-20"></div>
  </div>

  <!-- Sounds -->
  <audio id="click" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-2226.mp3" preload="auto">
  <audio id="success" src="https://assets.mixkit.co/sfx/preview/mixkit-completion-notification-2746.mp3" preload="auto">
  <audio id="error" src="https://assets.mixkit.co/sfx/preview/mixkit-game-over-trombone-1940.mp3" preload="auto">

  <!-- Main Card -->
  <div class="w-full max-w-md fade-in z-10 relative">
    <div class="text-center mb-8">
      <h1 class="text-[clamp(2.5rem,6vw,4rem)] font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-300 text-shadow pulse-glow">
        KAHOOT BOT PRO
      </h1>
      <p class="text-purple-300 text-lg">Spawn Bots • Make Everyone Cry 😈</p>
    </div>

    <div class="bg-black/70 backdrop-blur-lg rounded-3xl p-7 shadow-glow border-2 border-purple-500/30 hover:border-purple-400/50 transition-all">
      <div class="space-y-5">
        <!-- PIN -->
        <div>
          <label class="flex items-center gap-2 text-sm text-purple-200 mb-2">
            <i class="fa fa-key text-purple-400"></i> Game PIN
          </label>
          <input id="pin" type="text" placeholder="6-7 digits" class="w-full px-4 py-3 rounded-xl bg-purple-900/40 border border-purple-500/40 focus:outline-none input-glow text-white text-lg">
        </div>

        <!-- Bot Name -->
        <div>
          <label class="flex items-center gap-2 text-sm text-purple-200 mb-2">
            <i class="fa fa-user-secret text-purple-400"></i> Bot Base Name
          </label>
          <input id="name" type="text" placeholder="e.g. L KING, Kahoot Sucks" class="w-full px-4 py-3 rounded-xl bg-purple-900/40 border border-purple-500/40 focus:outline-none input-glow text-white text-lg">
        </div>

        <!-- Count -->
        <div>
          <label class="flex items-center gap-2 text-sm text-purple-200 mb-2">
            <i class="fa fa-hashtag text-purple-400"></i> Number of Bots <span class="text-xs opacity-70">(MAX 20)</span>
          </label>
          <input id="count" type="number" min="1" max="20" value="8" class="w-full px-4 py-3 rounded-xl bg-purple-900/40 border border-purple-500/40 focus:outline-none input-glow text-white text-lg">
        </div>

        <!-- Buttons -->
        <div class="grid grid-cols-2 gap-4 pt-2">
          <button id="start" class="bg-gradient-to-r from-purple-700 to-pink-600 hover:from-pink-600 hover:to-purple-700 text-white font-bold py-4 rounded-xl text-lg transition-all transform hover:scale-105 active:scale-95 shadow-lg hover:shadow-glow">
            <i class="fa fa-rocket mr-2"></i> SPAWN
          </button>
          <button id="stop" class="bg-purple-900/60 hover:bg-red-900/60 text-white font-bold py-4 rounded-xl text-lg transition-all opacity-75 hover:opacity-100 border border-purple-500/30" disabled>
            <i class="fa fa-stop-circle mr-2"></i> STOP
          </button>
        </div>

        <!-- Status -->
        <div id="status" class="mt-4 p-3 rounded-xl text-center font-medium hidden transition-all"></div>

        <!-- Progress -->
        <div id="progressBox" class="mt-3 hidden">
          <div class="w-full bg-purple-950/50 rounded-full h-3 overflow-hidden border border-purple-500/30">
            <div id="progressBar" class="bg-gradient-to-r from-green-400 to-purple-500 h-3 w-0 transition-all duration-300 shadow-glow"></div>
          </div>
          <p id="progressText" class="text-xs text-center mt-2 text-purple-300">0 / 0 Bots</p>
        </div>
      </div>
    </div>

    <p class="text-center text-xs text-purple-400/60 mt-5">⚠️ Kahoot Sucks • Get Rekt 😂</p>
  </div>

  <script src="script.js"></script>
</body>
  </html>
